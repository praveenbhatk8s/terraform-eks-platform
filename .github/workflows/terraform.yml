name: Terraform CI
on:
  push:
  pull_request:

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init
        working-directory: environments/dev
      - run: terraform validate
        working-directory: environments/dev
     # - run: terraform plan
     #   working-directory: environments/dev